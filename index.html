<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Pengadaan Barang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
                @media (max-width: 767.98px) {
                    .modern-table th, .modern-table td {
                        font-size: 12px;
                        padding: 6px 2px;
                        width: auto !important;
                        min-width: 90px;
                    }
                    .modern-table {
                        font-size: 12px;
                    }
                    .container.py-4 {
                        padding: 0.5rem 0.2rem !important;
                    }
                    .modal-dialog {
                        max-width: 98vw;
                        margin: 0.5rem auto;
                    }
                    .modal-content {
                        border-radius: 0.7rem;
                    }
                }
        .table-header-navy th {
            background-color: #14213d !important;
            color: #fff !important;
            border-bottom: 2px solid #e5e7eb !important;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .modern-table {
            border-collapse: separate;
            border-spacing: 0;
            background: #f8fafc;
            box-shadow: 0 2px 8px rgba(20,33,61,0.06);
            border-radius: 0.5rem;
            overflow: hidden;
        }
        .modern-table th, .modern-table td {
            border: 1px solid #e5e7eb !important;
            vertical-align: middle;
            text-align: center;
            width: calc(100% / 7);
            word-break: break-word;
        }
        .modern-table tbody tr:hover {
            background-color: #e9ecef !important;
            transition: background 0.2s;
        }
        .pie-chart-container {
            position: relative;
            max-width: 400px;
            margin: 0 auto;
        }
        .pr-status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        .badge-po-receipt {
            background-color: #ffc107;
            color: #000;
        }
        .badge-payment {
            background-color: #28a745;
            color: #fff;
        }
        .badge-belum-receipt {
            background-color: #dc3545;
            color: #fff;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 5px;
        }
        .alert-sm {
            margin-bottom: 0 !important;
            font-size: 0.875rem;
        }
        @media (max-width: 576px) {
            .navbar-brand {
                font-size: 1rem !important;
            }
            .navbar {
                padding: 0.5rem 1rem !important;
            }
            .container.py-4 {
                padding: 0.75rem !important;
            }
            h2 {
                font-size: 1.25rem !important;
            }
            .modern-table th, .modern-table td {
                font-size: 11px !important;
                padding: 4px 3px !important;
            }
            .table-header-navy th {
                padding: 4px 3px !important;
            }
            .btn-sm {
                padding: 0.25rem 0.5rem !important;
                font-size: 0.75rem !important;
            }
            .gap-2 {
                gap: 0.5rem !important;
            }
        }
        @media (max-width: 768px) {
            .modal-dialog {
                margin: 1rem auto !important;
            }
            .modal-body .row {
                flex-direction: column !important;
            }
            .modal-body .col-md-7,
            .modal-body .col-md-5 {
                width: 100% !important;
                margin-bottom: 1rem !important;
            }
            .pie-chart-container {
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">Dashboard</a>
    <div class="d-flex ms-auto align-items-center gap-2">
      <span id="navbar-username" class="me-2 d-none"></span>
      <button id="uploadBtn" class="btn btn-outline-success btn-sm d-none">Upload File</button>
      <button id="clearCacheBtn" class="btn btn-outline-warning btn-sm d-none" title="Clear localStorage cache">Clear Cache</button>
      <button id="loginBtn" class="btn btn-outline-primary btn-sm">Login</button>
      <button id="logoutBtn" class="btn btn-outline-danger btn-sm d-none ms-2">Logout</button>
    </div>
  </div>
</nav>

<div class="container py-4">
    <div class="row mb-3">
      <div class="col-12">
        <h2 class="text-center">Monitoring Pengadaan Barang</h2>
        <div class="alert alert-info alert-sm text-center" style="margin: 0; padding: 0.5rem;">
          <small id="updateDateTime">Data terakhir diupdate: -</small>
        </div>
      </div>
    </div>
    <div id="tableContainer" class="table-responsive">
        <table id="monitoringTable" class="table table-bordered table-hover align-middle modern-table text-center" style="table-layout: fixed; width: 100%;">
            <thead class="table-header-navy">
            <tr>
                <th>Project Code</th>
                <th>Project Name</th>
                <th>PR No</th>
                <th>PO No</th>
                <th>PR Date</th>
                <th>PR Status</th>
                <th>PO Payment</th>
            </tr>
            </thead>
            <tbody>
            <!-- Data will be loaded here by JS -->
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Detail -->
<div class="modal fade" id="detailModal" tabindex="-1" aria-labelledby="detailModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="detailModalLabel">Detail Pengadaan</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="row">
          <div class="col-md-7">
            <div id="detailContent">
              <!-- Detail akan diisi oleh JS -->
            </div>
          </div>
          <div class="col-md-5">
            <h6 class="text-center mb-3">Status PR Project</h6>
            <div class="pie-chart-container">
              <canvas id="statusChart"></canvas>
            </div>
            <div id="chartStats" class="mt-3" style="font-size: 12px;">
              <!-- Stats akan diisi oleh JS -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>



<!-- Modal Login -->
<div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="loginModalLabel">Login User</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="loginForm">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" required autocomplete="username">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" required autocomplete="current-password">
          </div>
          <div id="loginError" class="text-danger mb-2" style="display:none;"></div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Modal Upload File -->
<div class="modal fade" id="uploadModal" tabindex="-1" aria-labelledby="uploadModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="uploadModalLabel">Upload File JSON</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="uploadForm">
          <div class="mb-3">
            <label for="jsonFile" class="form-label">Pilih File JSON</label>
            <input type="file" class="form-control" id="jsonFile" accept=".json" required>
          </div>
          <div id="uploadError" class="text-danger mb-2" style="display:none;"></div>
          <div id="uploadSuccess" class="text-success mb-2" style="display:none;"></div>
          <button type="submit" class="btn btn-success w-100">Upload</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>
// Force clear localStorage untuk menghindari cache data lama
// Uncomment jika ingin force clear saat load
// localStorage.removeItem('uploadedData');
// localStorage.removeItem('uploadedTime');
// localStorage.removeItem('uploadedBy');
// --- LOGIN LOGIC ---
// Daftar user statis
const users = [
  { username: 'admin', password: '123456', name: 'Administrator', role: 'admin' },
];
let currentUser = null;

function updateNavbar() {
  const usernameSpan = document.getElementById('navbar-username');
  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const uploadBtn = document.getElementById('uploadBtn');
  const clearCacheBtn = document.getElementById('clearCacheBtn');
  if (currentUser) {
    usernameSpan.textContent = currentUser.name + ' (' + currentUser.role + ')';
    usernameSpan.classList.remove('d-none');
    loginBtn.classList.add('d-none');
    logoutBtn.classList.remove('d-none');
    clearCacheBtn.classList.remove('d-none');
    // Tampilkan upload button hanya untuk admin
    if (currentUser.role === 'admin') {
      uploadBtn.classList.remove('d-none');
    } else {
      uploadBtn.classList.add('d-none');
    }
  } else {
    usernameSpan.textContent = '';
    usernameSpan.classList.add('d-none');
    loginBtn.classList.remove('d-none');
    logoutBtn.classList.add('d-none');
    uploadBtn.classList.add('d-none');
    clearCacheBtn.classList.add('d-none');
  }
}

document.addEventListener('DOMContentLoaded', function() {
  // Navbar login button
  document.getElementById('loginBtn').addEventListener('click', function() {
    document.getElementById('loginForm').reset();
    document.getElementById('loginError').style.display = 'none';
    var modal = new bootstrap.Modal(document.getElementById('loginModal'));
    modal.show();
  });

  // Navbar logout button
  document.getElementById('logoutBtn').addEventListener('click', function() {
    // Auto clear cache saat logout
    localStorage.removeItem('uploadedData');
    localStorage.removeItem('uploadedTime');
    localStorage.removeItem('uploadedBy');
    currentUser = null;
    updateNavbar();
    alert('Logged out. Cache cleared.');
  });

  // Navbar clear cache button
  document.getElementById('clearCacheBtn').addEventListener('click', function() {
    if (confirm('Clear localStorage cache? Data akan di-load ulang dari file.')) {
      localStorage.removeItem('uploadedData');
      localStorage.removeItem('uploadedTime');
      localStorage.removeItem('uploadedBy');
      alert('Cache cleared! Reloading page...');
      location.reload();
    }
  });

  // Navbar upload button (admin only)
  document.getElementById('uploadBtn').addEventListener('click', function() {
    document.getElementById('uploadForm').reset();
    document.getElementById('uploadError').style.display = 'none';
    document.getElementById('uploadSuccess').style.display = 'none';
    var modal = new bootstrap.Modal(document.getElementById('uploadModal'));
    modal.show();
  });

  // Upload form submit
  document.getElementById('uploadForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const fileInput = document.getElementById('jsonFile');
    const file = fileInput.files[0];
    if (!file) {
      document.getElementById('uploadError').textContent = 'Pilih file terlebih dahulu!';
      document.getElementById('uploadError').style.display = 'block';
      return;
    }
    const reader = new FileReader();
    reader.onload = function(event) {
      try {
        const jsonData = JSON.parse(event.target.result);
        // Validasi format JSON (harus array)
        if (!Array.isArray(jsonData)) {
          throw new Error('File harus berisi array JSON!');
        }
        // Simpan ke localStorage dengan timestamp dan admin name
        const adminName = currentUser ? currentUser.name : 'Administrator';
        localStorage.setItem('uploadedData', JSON.stringify(jsonData));
        localStorage.setItem('uploadedTime', new Date().toISOString());
        localStorage.setItem('uploadedBy', adminName);
        document.getElementById('uploadSuccess').textContent = 'File berhasil diupload! Data akan ditampilkan di dashboard.';
        document.getElementById('uploadSuccess').style.display = 'block';
        // Reload page setelah 2 detik
        setTimeout(() => {
          location.reload();
        }, 2000);
      } catch (err) {
        document.getElementById('uploadError').textContent = 'Error: ' + err.message;
        document.getElementById('uploadError').style.display = 'block';
      }
    };
    reader.readAsText(file);
  });

  // Login form submit
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const user = users.find(u => u.username === username && u.password === password);
    if (user) {
      currentUser = user;
      updateNavbar();
      var modalEl = document.getElementById('loginModal');
      var modal = bootstrap.Modal.getInstance(modalEl);
      modal.hide();
    } else {
      document.getElementById('loginError').textContent = 'Username atau password salah!';
      document.getElementById('loginError').style.display = 'block';
    }
  });

  updateNavbar();

  // Load data table saat pertama kali
  loadTableData();
});

function loadTableData() {
  // Force clear old cache setiap kali load
  // localStorage.removeItem('uploadedData');
  // localStorage.removeItem('uploadedTime');
  // localStorage.removeItem('uploadedBy');
  
  // Cek apakah ada data yang diupload, jika ada gunakan itu, jika tidak gunakan data_monitoring.json
  let dataPromise;
  const uploadedData = localStorage.getItem('uploadedData');
  const uploadedTime = localStorage.getItem('uploadedTime');
  const uploadedBy = localStorage.getItem('uploadedBy');
  
  if (uploadedData) {
    dataPromise = Promise.resolve(JSON.parse(uploadedData));
  } else {
    dataPromise = fetch('data_monitoring.json?t=' + new Date().getTime()).then(response => response.json()).catch(err => {
      console.error('Error loading data:', err);
      return [];
    });
  }
  
  // Update tanggal update data - gunakan format ISO untuk konsistensi across devices
  const updateDateTimeElement = document.getElementById('updateDateTime');
  if (uploadedTime && uploadedBy) {
    try {
      // Parse ISO string dan convert ke local timezone
      const updateDate = new Date(uploadedTime);
      const options = {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        timeZoneName: 'short'
      };
      const localDateStr = new Intl.DateTimeFormat('id-ID', options).format(updateDate);
      updateDateTimeElement.textContent = `📅 Data diupdate oleh ${uploadedBy} pada: ${localDateStr}`;
    } catch(e) {
      updateDateTimeElement.textContent = 'Data terakhir diupdate: -';
    }
  } else {
    // Format tanggal loading untuk default data
    const options = {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      timeZoneName: 'short'
    };
    const localDateStr = new Intl.DateTimeFormat('id-ID', options).format(new Date());
    updateDateTimeElement.textContent = `📅 Data default dimuat pada: ${localDateStr}`;
  }
  
  dataPromise.then(data => {
    if (data.length === 0) {
      document.querySelector('#monitoringTable tbody').innerHTML = '<tr><td colspan="7" class="text-center text-muted py-5">Tidak ada data. Mohon upload file JSON terlebih dahulu.</td></tr>';
      document.getElementById('updateDateTime').textContent = 'ℹ️ Data kosong - silakan upload file';
      return;
    }
    
    // Destroy previous datatable instance jika ada
    if ($.fn.DataTable.isDataTable('#monitoringTable')) {
      $('#monitoringTable').DataTable().destroy();
    }
    
    let tbody = '';
    data.forEach(function(row, idx) {
      tbody += `<tr class="pointer" data-idx="${idx}">
        <td>${row.Project_Code || '-'}</td>
        <td>${row.Project_Name || '-'}</td>
        <td>${row.PR_No || '-'}</td>
        <td>${row.PO_No || '-'}</td>
        <td>${row.PR_Date || '-'}</td>
        <td>${row.PR_Status || '-'}</td>
        <td>${row.PO_Payment || '-'}</td>
      </tr>`;
    });
    document.querySelector('#monitoringTable tbody').innerHTML = tbody;

    let table = $('#monitoringTable').DataTable({
      responsive: true,
      language: {
        search: "Cari:",
        lengthMenu: "Tampilkan _MENU_ entri",
        info: "Menampilkan _START_ sampai _END_ dari _TOTAL_ entri",
        paginate: {
          first: "Pertama",
          last: "Terakhir",
          next: "Berikutnya",
          previous: "Sebelumnya"
        }
      }
    });

    $('#monitoringTable tbody').on('click', 'tr', function() {
      let idx = $(this).data('idx');
      let detail = data[idx];
      const projectCode = detail.Project_Code;
      const projectName = detail.Project_Name;
      const prNo = detail.PR_No;
      
      const labelMap = {
        Project_Code: 'Project Code',
        Project_Name: 'Project Name',
        PR_No: 'Purchase Request No',
        PO_No: 'PO No',
        PR_Date: 'PR Date',
        Delivery_Date: 'Delivery Date',
        PO_Date: 'PO Date',
        Request_Delivery: 'Req Delivery',
        Item_Name: 'Item Name',
        Quantity: 'Total Purchase Order Qty',
        Invoicing_Status: 'Invoicing Status',
        Leadtime_PR_PO: 'ACT SPB TO REQUEST',
        Leadtime_PO_Deliv: 'STD LEADTIME PCH',
        ETA: 'ETA',
        Remark: 'ACT LEADTIME TO ETA',
        Act_Request_to_PO: 'SCORING SPB',
        Act_PR_to_Request: 'SCORING LEAD TIME',
        PR_Status: 'PR Status',
        PO_Payment: 'PO Payment'
      };
      let fields = [];
      for (const key of Object.keys(labelMap)) {
        if (detail.hasOwnProperty(key)) {
          fields.push({label: labelMap[key], value: detail[key] || '-'});
        }
      }
      let detailHtml = '';
      fields.forEach(function(field) {
        let html = `<div class="mb-2"><strong>${field.label}:</strong> <span>${field.value}</span></div>`;
        detailHtml += html;
      });
      document.getElementById('detailContent').innerHTML = detailHtml;
      
      // Render pie chart berdasarkan Project Code
      renderProjectChart(projectCode, projectName, data);
      
      var modal = new bootstrap.Modal(document.getElementById('detailModal'));
      modal.show();
    });

    // --- PIE CHART LOGIC ---
    let chartInstance = null;

    function renderProjectChart(projectCode, projectName, allData) {
      // Filter data by Project_Code
      const projectData = allData.filter(item => item.Project_Code === projectCode);
      if (projectData.length === 0) {
        alert('No data found for Project Code: ' + projectCode);
        return;
      }

      // Hitung jumlah PR_No berdasarkan total baris data (tidak unique, karena 1 PR bisa punya multiple PO)
      const totalPRs = projectData.length;

      // Hitung status berdasarkan PO_Payment
      let statusCount = {
        'received': 0,      // Submit Payment
        'waiting': 0,       // Waiting Payment
        'paid': 0,          // Paid
        'empty': 0          // Empty/Kosong
      };

      projectData.forEach(record => {
        const poPayment = (record.PO_Payment || '').toLowerCase().trim();
        
        if (poPayment.includes('submit')) {
          statusCount['received']++;
        } else if (poPayment.includes('waiting')) {
          statusCount['waiting']++;
        } else if (poPayment.includes('paid')) {
          statusCount['paid']++;
        } else {
          statusCount['empty']++;
        }
      });

      const totalPOPayment = projectData.length;

      // Debug log untuk memastikan data benar
      console.log('DEBUG renderProjectChart:', {
        projectCode: projectCode,
        totalData: projectData.length,
        statusCount: statusCount,
        data: projectData.slice(0, 5)
      });

      // Destroy existing chart jika ada
      if (chartInstance) {
        chartInstance.destroy();
      }

      // Create pie chart
      const ctx = document.getElementById('statusChart').getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Sudah Diterima PO', 'Masih dalam Proses', 'Sudah di Payment'],
          datasets: [{
            data: [statusCount.received, statusCount.waiting, statusCount.paid],
            backgroundColor: [
              '#ffc107', // Received - Yellow
              '#dc3545', // Waiting - Red
              '#28a745'  // Paid - Green
            ],
            borderColor: [
              '#fff',
              '#fff',
              '#fff'
            ],
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: {
              position: 'right',
              labels: {
                boxWidth: 12,
                font: {
                  size: 11
                }
              }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  const label = context.label || '';
                  const value = context.parsed || 0;
                  const total = context.dataset.data.reduce((a, b) => a + b, 0);
                  const percentage = ((value / total) * 100).toFixed(1);
                  return label + ': ' + value + ' (' + percentage + '%)';
                }
              }
            }
          }
        }
      });

      // Update stats
      const statsHtml = `
        <div class="mb-2">
          <small class="d-block"><strong>Project Code:</strong> ${projectCode}</small>
        </div>
        <div class="mb-2">
          <small class="d-block"><strong>Total PR No:</strong> ${totalPRs}</small>
        </div>
        <hr style="margin: 8px 0;">
        <div class="mb-2">
          <small class="d-block"><span class="badge badge-po-receipt">Sudah Diterima</span>${statusCount.received}</small>
        </div>
        <div class="mb-2">
          <small class="d-block"><span class="badge" style="background-color: #dc3545; color: #fff;">Masih Proses</span>${statusCount.waiting}</small>
        </div>
        <div class="mb-2">
          <small class="d-block"><span class="badge badge-payment">Sudah Payment</span>${statusCount.paid}</small>
        </div>
        <div class="mb-2">
          <small class="d-block"><span class="badge" style="background-color: #6c757d; color: #fff;">Belum Dipilih</span>${statusCount.empty}</small>
        </div>
        <hr style="margin: 8px 0;">
        <small class="d-block text-center"><strong>Total PO: ${totalPOPayment}</strong></small>
      `;
      document.getElementById('chartStats').innerHTML = statsHtml;
    }
  });
}
</script>
